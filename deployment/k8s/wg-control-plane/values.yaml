# Default values for wg-control-plane.
# Install: helm install wgcp ./deployment/k8s/wg-control-plane -f your-values.yaml

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# WireGuard needs NET_ADMIN (and often privileged + /dev/net/tun). Namespaces with
# Pod Security "baseline" or "restricted" will reject that.
# - Dedicated NS: helm install ... -n wg-cp --create-namespace with namespace.create: true
#   (not valid for default/kube-system — use kubectl label instead).
# - Any NS: kubectl label ns <namespace> pod-security.kubernetes.io/enforce=privileged --overwrite
namespace:
  create: false
  labels: {}


image:
  repository: ghcr.io/nfuchen/wg-control-plane
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

# WireGuard needs interface management; many clusters require privileged or NET_ADMIN + /dev/net/tun.
securityContext:
  privileged: true
  capabilities:
    add:
      - NET_ADMIN
      - SYS_MODULE
  # If your CNI allows a non-privileged setup, set privileged: false and tune capabilities.

hostNetwork: false

# Some clusters need the TUN device from the node; requires a compatible CNI and hostPath.
wireguard:
  mountDevNetTun: false

service:
  type: ClusterIP
  httpPort: 8080
  wireguardPort: 51820
  annotations: {}

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: wg-cp.prod.ainfolink.net
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# HTTP probes use Spring Boot Actuator (/actuator/health). Set to tcpSocket if actuator is disabled.
probes:
  http:
    enabled: true
    path: /swagger-ui/index.html
    liveness:
      initialDelaySeconds: 90
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 2Gi
  # Set to use an existing PVC instead of creating one
  existingClaim: ""

env:
  wireguardConfigDir: /etc/wireguard
  appBaseUrl: "https://wg-cp.prod.ainfolink.net"
  mailHost: smtp.gmail.com
  mailPort: "587"
  mailUsername: ""
  mailPassword: ""
  emailFrom: noreply@example.com
  emailFromName: "WireGuard Control Plane"
  appInternalApiKey: ""
  adminUsername: admin
  adminPassword: changeme
  adminEmail: admin@example.com

# Embedded PostgreSQL (Bitnami). Set postgresql.enabled: false to use an external database.
postgresql:
  enabled: false
  auth:
    username: wguser
    password: changeme
    database: wg_control_plane
  primary:
    persistence:
      enabled: true
      size: 8Gi

# Used when postgresql.enabled is false
externalDatabase:
  host: <host>
  port: 5432
  database: wg_control_plane
  username: <username>
  password: <password>

# create the namespace and label it as privileged
# kubectl create namespace wg-cp
# kubectl label ns wg-cp pod-security.kubernetes.io/enforce=privileged --overwrite

# install the chart
# helm upgrade --install wg-cp . -n wg-cp