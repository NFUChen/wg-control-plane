# Stack for WireGuard Control Plane + PostgreSQL.
# Copy .env.example to .env in this directory and adjust secrets.
# From repo root: docker compose -f deployment/docker/docker-compose.yml --env-file deployment/docker/.env up -d
# Or: cd deployment/docker && docker compose --env-file .env up -d

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    container_name: wg-control-plane-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wg_control_plane}
      POSTGRES_USER: ${POSTGRES_USER:-wguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - wg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wguser} -d ${POSTGRES_DB:-wg_control_plane}"]
      interval: 20s
      timeout: 10s
      retries: 3

  wg-control-plane:
    image: ${WG_CP_IMAGE:-ghcr.io/nfuchen/wg-control-plane:latest}
    container_name: wg-control-plane-app
    ports:
      - "${WG_CP_HTTP_PORT:-8080}:8080"
      - "${WG_CP_WG_PORT:-51820}:51820/udp"
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-wg_control_plane}
      DB_USERNAME: ${POSTGRES_USER:-wguser}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@example.com}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_INTERNAL_API_KEY: ${APP_INTERNAL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-WireGuard Control Plane}
      WIREGUARD_CONFIG_DIR: ${WIREGUARD_CONFIG_DIR:-/etc/wireguard}
    depends_on:
      postgres:
        condition: service_healthy
    privileged: true
    volumes:
      - /lib/modules:/lib/modules:ro
      - wireguard-config:/etc/wireguard
    networks:
      - wg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  wireguard-config:
  postgres-data:

networks:
  wg-network:
    driver: bridge
