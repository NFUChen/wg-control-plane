version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wg-control-plane-postgres
    environment:
      POSTGRES_DB: wg_control_plane
      POSTGRES_USER: wguser
      POSTGRES_PASSWORD: wgpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - wg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wguser -d wg_control_plane"]
      interval: 20s
      timeout: 10s
      retries: 3

  wg-control-plane:
    image: wg-control-plane:dev
    container_name: wg-control-plane-app
    ports:
      - "8080:8080"
      - "51820:51820/udp"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=wg_control_plane
      - DB_USERNAME=wguser
      - DB_PASSWORD=wgpassword
    depends_on:
      postgres:
        condition: service_healthy
    # WireGuard requires privileged access to manage network interfaces
    privileged: true
    # Alternative to privileged mode (more secure but may not work in all scenarios):
    # cap_add:
    #   - NET_ADMIN
    #   - SYS_MODULE
    # devices:
    #   - /dev/net/tun:/dev/net/tun
    # sysctls:
    #   - net.ipv4.ip_forward=1
    #   - net.ipv6.conf.all.forwarding=1
    volumes:
      # Mount host network namespace if needed for WireGuard operations
      - /lib/modules:/lib/modules:ro
      # Optional: Mount a volume for persistent WireGuard configurations
      - wireguard-config:/etc/wireguard
    networks:
      - wg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  wireguard-config:
  postgres-data:

networks:
  wg-network:
    driver: bridge