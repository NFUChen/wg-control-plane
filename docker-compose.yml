version: '3.8'

services:
  wg-control-plane:
    image: wg-control-plane:dev
    container_name: wg-control-plane-app
    ports:
      - "8080:8080"
      - "51820:51820/udp"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    # WireGuard requires privileged access to manage network interfaces
    privileged: true
    # Alternative to privileged mode (more secure but may not work in all scenarios):
    # cap_add:
    #   - NET_ADMIN
    #   - SYS_MODULE
    # devices:
    #   - /dev/net/tun:/dev/net/tun
    # sysctls:
    #   - net.ipv4.ip_forward=1
    #   - net.ipv6.conf.all.forwarding=1
    volumes:
      # Mount host network namespace if needed for WireGuard operations
      - /lib/modules:/lib/modules:ro
      # Optional: Mount a volume for persistent WireGuard configurations
      - wireguard-config:/etc/wireguard
    networks:
      - wg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  wireguard-config:

networks:
  wg-network:
    driver: bridge