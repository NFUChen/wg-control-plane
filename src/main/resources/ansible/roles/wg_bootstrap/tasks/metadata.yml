---
# Get cloud provider metadata for WireGuard configuration

- name: Detect cloud provider (try AWS first)
  uri:
    url: "http://169.254.169.254/latest/meta-data/instance-id"
    method: GET
    timeout: 3
    status_code: [200, 401, 404]
  register: aws_detection
  failed_when: false
  ignore_errors: true

- name: Set cloud provider fact
  set_fact:
    wg_cloud_provider: "{{ 'aws' if aws_detection.status in [200, 401] else 'azure' }}"

- name: Get AWS metadata using script
  block:
    - name: Copy AWS metadata script
      template:
        src: get_aws_metadata.sh.j2
        dest: /tmp/get_aws_metadata.sh
        mode: '0755'

    - name: Execute AWS metadata script
      command: /tmp/get_aws_metadata.sh
      register: aws_metadata_result
      failed_when: aws_metadata_result.rc != 0

    - name: Debug script output
      debug:
        msg: |
          Script return code: {{ aws_metadata_result.rc }}
          Script stdout: {{ aws_metadata_result.stdout }}
          Script stderr: {{ aws_metadata_result.stderr }}
      when: wg_bootstrap_debug | default(false) or aws_metadata_result.rc != 0

    - name: Parse AWS metadata JSON
      set_fact:
        wg_host_metadata: "{{ aws_metadata_result.stdout | from_json }}"
      when: aws_metadata_result.rc == 0 and aws_metadata_result.stdout | length > 0

    - name: Display collected metadata
      debug:
        msg: |
          Raw script output: {{ aws_metadata_result.stdout }}
          Parsed metadata: {{ wg_host_metadata }}

    - name: Send AWS metadata to Kotlin application
      uri:
        url: "{{ wg_metadata_callback_url }}?provider=aws"
        method: POST
        headers:
          Content-Type: application/json
        body: "{{ wg_host_metadata | to_json }}"
        timeout: 30
        status_code: [200, 201]
      register: aws_metadata_send_result
      retries: 3
      delay: 5
      failed_when: false
      when:
        - wg_host_metadata is defined
        - wg_metadata_callback_url is defined
        - wg_metadata_callback_url | length > 0

    - name: Debug metadata send result
      debug:
        msg: |
          Metadata send URL: {{ wg_metadata_callback_url }}?provider=aws
          Metadata send status: {{ aws_metadata_send_result.status | default('No response') }}
          Metadata send response: {{ aws_metadata_send_result.json | default('No JSON response') }}
          Metadata send error: {{ aws_metadata_send_result.msg | default('No error message') }}
          Connection info: {{ aws_metadata_send_result.failed | default(false) }}
          Raw result: {{ aws_metadata_send_result }}
      when:
        - aws_metadata_send_result is defined
        - (wg_bootstrap_debug | default(false) or aws_metadata_send_result.status not in [200, 201])

    - name: Clean up metadata script
      file:
        path: /tmp/get_aws_metadata.sh
        state: absent

  when: wg_cloud_provider == "aws"

- name: Get Azure metadata using script
  block:
    - name: Copy Azure metadata script
      template:
        src: get_azure_metadata.sh.j2
        dest: /tmp/get_azure_metadata.sh
        mode: '0755'

    - name: Execute Azure metadata script
      command: /tmp/get_azure_metadata.sh
      register: azure_metadata_result
      failed_when: azure_metadata_result.rc != 0

    - name: Debug script output
      debug:
        msg: |
          Script return code: {{ azure_metadata_result.rc }}
          Script stdout: {{ azure_metadata_result.stdout }}
          Script stderr: {{ azure_metadata_result.stderr }}
      when: wg_bootstrap_debug | default(false) or azure_metadata_result.rc != 0

    - name: Parse Azure metadata JSON
      set_fact:
        wg_host_metadata: "{{ azure_metadata_result.stdout | from_json }}"
      when: azure_metadata_result.rc == 0 and azure_metadata_result.stdout | length > 0

    - name: Display collected metadata
      debug:
        msg: |
          Raw script output: {{ azure_metadata_result.stdout }}
          Parsed metadata: {{ wg_host_metadata }}

    - name: Send Azure metadata to Kotlin application
      uri:
        url: "{{ wg_metadata_callback_url }}?provider=azure"
        method: POST
        headers:
          Content-Type: application/json
        body: "{{ wg_host_metadata | to_json }}"
        timeout: 30
        status_code: [200, 201]
      register: azure_metadata_send_result
      retries: 3
      delay: 5
      failed_when: false
      when:
        - wg_host_metadata is defined
        - wg_metadata_callback_url is defined
        - wg_metadata_callback_url | length > 0

    - name: Debug metadata send result
      debug:
        msg: |
          Metadata send URL: {{ wg_metadata_callback_url }}?provider=azure
          Metadata send status: {{ azure_metadata_send_result.status | default('No response') }}
          Metadata send response: {{ azure_metadata_send_result.json | default('No JSON response') }}
          Metadata send error: {{ azure_metadata_send_result.msg | default('No error message') }}
          Connection info: {{ azure_metadata_send_result.failed | default(false) }}
          Raw result: {{ azure_metadata_send_result }}
      when:
        - azure_metadata_send_result is defined
        - (wg_bootstrap_debug | default(false) or azure_metadata_send_result.status not in [200, 201])

    - name: Clean up metadata script
      file:
        path: /tmp/get_azure_metadata.sh
        state: absent

  when: wg_cloud_provider == "azure"

- name: Debug collected metadata
  debug:
    var: wg_host_metadata
  when: wg_bootstrap_debug | default(false)