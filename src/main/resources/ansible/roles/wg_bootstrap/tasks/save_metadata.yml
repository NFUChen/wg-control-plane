---
# Save collected metadata to files for later use

- name: Create metadata output directory
  file:
    path: "{{ wg_bootstrap_metadata_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true
  become: false

- name: Save host metadata to JSON file
  copy:
    content: "{{ wg_host_metadata | to_nice_json }}"
    dest: "{{ wg_bootstrap_metadata_dir }}/{{ inventory_hostname }}_metadata.json"
    mode: '0644'
  delegate_to: localhost
  become: false

- name: Generate Terraform variables file
  copy:
    content: |
      # Generated metadata for {{ inventory_hostname }}
      # Cloud Provider: {{ wg_host_metadata.cloud_provider | upper }}
      # Generated: {{ ansible_date_time.iso8601 }}

      {{ wg_host_metadata.terraform_var_name }} = "{{ wg_host_metadata.terraform_var_value }}"

      # Additional metadata
      instance_id = "{{ wg_host_metadata.instance_id }}"
      private_ip = "{{ wg_host_metadata.private_ip }}"
      {% if wg_host_metadata.cloud_provider == "aws" %}
      region = "{{ wg_host_metadata.region }}"
      availability_zone = "{{ wg_host_metadata.availability_zone }}"
      {% elif wg_host_metadata.cloud_provider == "azure" %}
      location = "{{ wg_host_metadata.location }}"
      resource_group = "{{ wg_host_metadata.resource_group }}"
      subscription_id = "{{ wg_host_metadata.subscription_id }}"
      {% endif %}
    dest: "{{ wg_bootstrap_metadata_dir }}/{{ inventory_hostname }}_terraform.tfvars"
    mode: '0644'
  delegate_to: localhost
  become: false

- name: Generate combined Terraform variables
  template:
    src: combined_terraform_vars.j2
    dest: "{{ wg_bootstrap_metadata_dir }}/all_hosts_terraform.tfvars"
    mode: '0644'
  delegate_to: localhost
  run_once: true
  become: false
  when: wg_bootstrap_generate_combined | default(true)

- name: Display Terraform variable for this host
  debug:
    msg: |
      Terraform variable for {{ inventory_hostname }}:
      {{ wg_host_metadata.terraform_var_name }} = "{{ wg_host_metadata.terraform_var_value }}"
  when: wg_bootstrap_debug | default(false)