---
# Package installation settings
wg_bootstrap_update_cache: true
wg_bootstrap_install_packages_debian:
  - python3
  - python3-apt
wg_bootstrap_install_packages_redhat:
  - python3
  - python3-libselinux

# Metadata collection settings
wg_bootstrap_get_metadata: true
wg_bootstrap_save_metadata: false
wg_bootstrap_generate_combined: true
wg_bootstrap_debug: false
wg_bootstrap_metadata_dir: "./metadata_output"

# AWS specific settings
wg_aws_token_ttl: "21600"  # 6 hours
