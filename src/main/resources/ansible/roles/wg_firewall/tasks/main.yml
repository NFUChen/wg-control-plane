---
- name: Skip firewall management
  ansible.builtin.debug:
    msg: "wg_firewall_manage is false or wg_firewall_backend is skip — no firewall changes."
  when: (not wg_firewall_manage | bool) or (wg_firewall_backend == 'skip')

- name: Resolve firewall backend (auto)
  ansible.builtin.set_fact:
    wg_firewall_backend_resolved: >-
      {{
        'ufw' if ansible_os_family == 'Debian' else
        'firewalld' if ansible_os_family == 'RedHat' else
        'skip'
      }}
  when:
    - wg_firewall_manage | bool
    - wg_firewall_backend == 'auto'

- name: Use explicit firewall backend
  ansible.builtin.set_fact:
    wg_firewall_backend_resolved: "{{ wg_firewall_backend }}"
  when:
    - wg_firewall_manage | bool
    - wg_firewall_backend != 'auto'

- name: Allow WireGuard UDP (ufw)
  community.general.ufw:
    rule: allow
    port: "{{ wg_listen_port | string }}"
    proto: udp
    comment: wireguard-ansible
  when:
    - wg_firewall_manage | bool
    - wg_firewall_backend_resolved | default('skip') == 'ufw'
  become: true

- name: Ensure firewalld is present (RedHat)
  ansible.builtin.dnf:
    name: firewalld
    state: present
  when:
    - wg_firewall_manage | bool
    - wg_firewall_backend_resolved | default('skip') == 'firewalld'
    - ansible_os_family == 'RedHat'
  become: true

- name: Ensure firewalld is running
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true
  when:
    - wg_firewall_manage | bool
    - wg_firewall_backend_resolved | default('skip') == 'firewalld'
  become: true

- name: Allow WireGuard UDP (firewalld)
  community.general.firewalld:
    port: "{{ wg_listen_port }}/udp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - wg_firewall_manage | bool
    - wg_firewall_backend_resolved | default('skip') == 'firewalld'
  become: true

- name: Allow WireGuard UDP (iptables INPUT)
  community.general.iptables:
    chain: INPUT
    protocol: udp
    destination_port: "{{ wg_listen_port }}"
    jump: ACCEPT
    comment: wireguard-ansible
  when:
    - wg_firewall_manage | bool
    - wg_firewall_backend_resolved | default('skip') == 'iptables'
  become: true
