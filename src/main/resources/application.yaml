spring:
  datasource:
    driver-class-name: 'org.postgresql.Driver'
    url: 'jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wg_control_plane}'
    username: '${DB_USERNAME:wguser}'
    password: '${DB_PASSWORD:wgpassword}'
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: false
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

  web:
    resources:
      static-locations:
        - 'file:/app/static/'
        - 'classpath:/META-INF/resources/'
        - 'classpath:/resources/'
        - 'classpath:/static/'
        - 'classpath:/public/'
  application:
    name: wg-control-plane

  # Email configuration
  mail:
    host: '${MAIL_HOST:smtp.gmail.com}'
    port: '${MAIL_PORT:587}'
    username: '${MAIL_USERNAME:}'
    password: '${MAIL_PASSWORD:}'
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: '*'
    test-connection: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  root: INFO

app:
  admin:
    username: 'admin'
    password: 'admin'
    email: 'admin@example.com'
  base-url: '${APP_BASE_URL:http://localhost:8080}'
  security:
    internal-api-key: '${APP_INTERNAL_API_KEY:}'

email:
  from: '${EMAIL_FROM:noreply@example.com}'
  fromName: '${EMAIL_FROM_NAME:WireGuard Control Plane}'

web:
  jwt-secret: ItIsASecretValueForJWT
  jwt-valid-seconds: 3600
  domain: localhost
  unprotected-routes: /swagger-ui.html, /swagger-ui/**, /v3/api-docs/**, /v2/api-docs/**, /swagger-resources/**, /webjars/**, /api/public/**, /api/internal/**, /actuator/health, /actuator/health/**, /actuator/info, /actuator/metrics

wireguard:
  config:
    directory: '${WIREGUARD_CONFIG_DIR:/etc/wireguard}'
