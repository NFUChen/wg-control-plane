spring:
  datasource:
    driver-class-name: 'org.h2.Driver'
    username: 'sa'
    password:
    url: 'jdbc:h2:mem:my_app'
  h2:
    console:
      enabled: true
      path: '/h2'
  jpa:
    generate-ddl: false
    open-in-view: false
    hibernate:
      ddl-auto: update

  web:
    resources:
      static-locations:
        - file:/app/static/
        - classpath:/META-INF/resources/
        - classpath:/resources/
        - classpath:/static/
        - classpath:/public/